<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ferrari - File a Complaint</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
/* Floating Home Button */
.home-btn {
  position: fixed;
  bottom: 40px;
  left: 40px;
  z-index: 9999;
  background: var(--ferrari-red);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 14px 28px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  text-decoration: none;
  cursor: none;
  box-shadow: 0 8px 25px rgba(255, 40, 0, 0.4);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.home-btn:hover {
  background: #fff;
  color: var(--ferrari-red);
  transform: translateY(-3px);
  box-shadow: 0 12px 30px rgba(255, 40, 0, 0.6);
}
    body {
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      min-height: 100vh;
      padding: 40px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      max-width: 700px;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255, 40, 0, 0.3);
      border: 1px solid rgba(255, 255, 0, 0.2);
      backdrop-filter: blur(10px);
    }

    h1 {
      text-align: center;
      font-size: 45px;
      margin-bottom: 15px;
      color: #ff2800;
      text-shadow: 2px 2px 10px black;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .subtitle {
      text-align: center;
      font-size: 16px;
      color: #ddd;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 0, 0.3);
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-family: Arial, sans-serif;
      transition: all 0.3s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: yellow;
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 15px rgba(255, 255, 0, 0.3);
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ff2800, #ff6b00);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 10px 30px rgba(255, 40, 0, 0.4);
      margin-top: 20px;
    }

    .btn-submit:hover {
      transform: scale(1.02) translateY(-3px);
      box-shadow: 0 15px 40px rgba(255, 40, 0, 0.6);
    }

    .required {
      color: #ff6b6b;
    }

    @media (max-width: 600px) {
      .container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <a href="C:\Users\HP\Desktop\ferrari\ferrari vid.html" class="home-btn">🏠 Home</a>
  <div class="container">
    <h1>File a Complaint</h1>
    <p class="subtitle">We value your feedback. Please fill out this form to report any issues.</p>

    <form id="complaintForm">
      <div class="form-group">
        <label for="name">Full Name <span class="required">*</span></label>
        <input type="text" id="name" name="name" placeholder="Your full name" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number <span class="required">*</span></label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 123-4567" required>
      </div>

      <div class="form-group">
        <label for="complaintType">Type of Complaint <span class="required">*</span></label>
        <select id="complaintType" name="complaintType" required>
          <option value="">-- Select complaint type --</option>
          <option value="product-quality">Product Quality Issue</option>
          <option value="service">Poor Service</option>
          <option value="delivery">Delivery Problem</option>
          <option value="damaged-vehicle">Damaged/Defective Vehicle</option>
          <option value="pricing">Pricing Issue</option>
          <option value="warranty">Warranty Concern</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="details">Complaint Details <span class="required">*</span></label>
        <textarea id="details" name="details" placeholder="Please describe your complaint in detail..." required></textarea>
      </div>

      <button type="submit" class="btn-submit">Submit Complaint</button>
    </form>
  </div>

  <script>
    document.getElementById('complaintForm').addEventListener('submit', function(e) {
      e.preventDefault(); // Prevent default page refresh/post
      
      // Collect specific form inputs
      const complaintData = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        type: document.getElementById('complaintType').value,
        details: document.getElementById('details').value,
        date: new Date().toLocaleString()
      };

      // 1. Save data seamlessly to Browser Local Storage (like a database)
      let complaints = JSON.parse(localStorage.getItem('ferrari_complaints')) || [];
      complaints.push(complaintData);
      localStorage.setItem('ferrari_complaints', JSON.stringify(complaints));

      // 2. Automatically generate and download a text receipt for the user
      const fileText = `FERRARI COMPLAINT REPORT\n\nDate: ${complaintData.date}\nName: ${complaintData.name}\nEmail: ${complaintData.email}\nPhone: ${complaintData.phone}\nType: ${complaintData.type}\n\nDetails:\n${complaintData.details}`;
      const blob = new Blob([fileText], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `Ferrari_Complaint_${new Date().getTime()}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      // 3. Provide UI feedback
      alert('Complaint Saved Successfully! A copy has been downloaded to your computer.');
      this.reset(); // Clear the form
    });
  </script>
</body>
</html>
